            <h2 id="0x00-字符串相关"><a href="#0x00-字符串相关" class="headerlink" title="0x00 字符串相关"></a>0x00 字符串相关</h2><figure class="highlight c"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br></pre></td><td class="code"><pre><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">zend_str_tolower</span><span class="params">(<span class="keyword">char</span> *str, <span class="keyword">size_t</span> len)</span></span>;  <span class="comment">// 转换字符串 char * 为小写</span></span><br><span class="line"><span class="function">zend_string* <span class="title">zend_string_tolower</span><span class="params">(zend_string *str)</span></span>;  <span class="comment">// 转换字符串 zend_string * 为小写</span></span><br><span class="line"><span class="function">zend_string* <span class="title">php_string_tolower</span><span class="params">(zend_string *str)</span></span>;  <span class="comment">// 功能跟上面一样，是 strtolower 的原型</span></span><br><span class="line"><span class="function">zend_string* <span class="title">php_string_toupper</span><span class="params">(zend_string *str)</span></span>;  <span class="comment">// strtoupper 的原型</span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">// 格式化成 zend_string *, 使用完记得 zend_string_release</span></span><br><span class="line"><span class="function">zend_string *<span class="title">strpprintf</span><span class="params">(<span class="keyword">size_t</span> max_len, <span class="keyword">const</span> <span class="keyword">char</span> *format, ...)</span></span>;</span><br><span class="line"><span class="comment">// 格式化成 char *, 使用完记得 efree</span></span><br><span class="line"><span class="keyword">size_t</span> spprintf( <span class="keyword">char</span> **pbuf, <span class="keyword">size_t</span> max_len, <span class="keyword">const</span> <span class="keyword">char</span> *format, ...);</span><br><span class="line"></span><br><span class="line">smart_str_*  <span class="comment">// 待分析</span></span><br><span class="line"></span><br><span class="line"><span class="function">zend_string *<span class="title">zval_get_string</span><span class="params">(zval *val)</span></span>;  <span class="comment">// 从 zval 转换为 zend_string 并 COPY 一份</span></span><br></pre></td></tr></table></figure>
<h2 id="0x01-数组相关"><a href="#0x01-数组相关" class="headerlink" title="0x01 数组相关"></a>0x01 数组相关</h2><figure class="highlight c"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">uint32_t</span> zend_hash_num_elements(HashTable *ht);  <span class="comment">// 获取数组大小</span></span><br><span class="line"><span class="function">zval* <span class="title">zend_hash_find</span><span class="params">(HashTable *ht, zend_string *key)</span></span>;  <span class="comment">// 根据 zend_string * 作为 key 查找数组</span></span><br><span class="line"><span class="function">zval* <span class="title">zend_hash_str_find</span><span class="params">(HashTable *ht, <span class="keyword">char</span> *str, <span class="keyword">size_t</span> len)</span></span>;  <span class="comment">// 根据 char * 作为 key 查找数组</span></span><br><span class="line"><span class="function">zval* <span class="title">zend_hash_index_find</span><span class="params">(HashTable *ht, zend_ulong h)</span></span>;  <span class="comment">// 查找索引 h 的数组元素</span></span><br><span class="line"><span class="function"><span class="keyword">void</span>* <span class="title">zend_hash_find_ptr</span><span class="params">(HashTable *ht, zend_string *key)</span></span>;  <span class="comment">// 同上，只是返回元素指针指向的值</span></span><br><span class="line"><span class="function"><span class="keyword">void</span>* <span class="title">zend_hash_str_find_ptr</span><span class="params">(HashTable *ht, <span class="keyword">char</span> *str, <span class="keyword">size_t</span> len)</span></span>;  <span class="comment">// 跟上同类</span></span><br><span class="line"><span class="function"><span class="keyword">void</span>* <span class="title">zend_hash_index_find_ptr</span><span class="params">(HashTable *ht, zend_ulong h)</span></span>;  <span class="comment">// 跟上同类</span></span><br><span class="line"><span class="function">zend_bool <span class="title">zend_hash_exists</span><span class="params">(HashTable *ht, zend_string *key)</span></span>;  <span class="comment">// zend_string * key 是否存在</span></span><br><span class="line"><span class="function">zend_bool <span class="title">zend_hash_str_exists</span><span class="params">(HashTable *ht, <span class="keyword">char</span> *str, <span class="keyword">size_t</span> len)</span></span>;  <span class="comment">// char * key 是否存在</span></span><br><span class="line"><span class="function">zend_bool <span class="title">zend_hash_index_exists</span><span class="params">(HashTable *ht, zend_ulong h)</span></span>;  <span class="comment">// 索引 h 是否存在</span></span><br><span class="line"></span><br><span class="line"><span class="function">zend_array *<span class="title">HASH_OF</span><span class="params">(zval *val)</span></span>;  <span class="comment">// 其实 HASH_OF 是一个宏，参数 value 可以是数组 `IS_ARRAY` 或者对象 `IS_OBJECT`，否则返回 NULL</span></span><br></pre></td></tr></table></figure>
<h2 id="0x02-方法和函数相关"><a href="#0x02-方法和函数相关" class="headerlink" title="0x02 方法和函数相关"></a>0x02 方法和函数相关</h2><figure class="highlight c"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><span class="line"><span class="function">zval* <span class="title">zend_call_method</span><span class="params">(zval *object_pp, zend_class_entry *obj_ce, zend_function **fn_proxy, <span class="keyword">const</span> <span class="keyword">char</span> *function_name, <span class="keyword">size_t</span> function_name_len, zval *retval, <span class="keyword">int</span> param_count, zval* arg1, zval* arg2)</span></span>;  <span class="comment">// 调用类实例成员方法</span></span><br><span class="line"><span class="function">zval* <span class="title">zend_call_method_with_0_params</span><span class="params">(zval *object_pp, zend_class_entry *obj_ce, zend_function **fn_proxy, <span class="keyword">const</span> <span class="keyword">char</span> *function_name, zval *retval)</span></span>;  <span class="comment">// zend_call_method 的缩写，不传递参数</span></span><br><span class="line"><span class="comment">// 同类还有 zend_call_method_with_1_params 和 zend_call_method_with_2_params</span></span><br><span class="line">输出</span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">php_var_dump</span><span class="params">(zval *struc, <span class="keyword">int</span> level)</span></span>;  <span class="comment">// 类似 var_dump 方法, 需要引入 ext/standard/php_var.h</span></span><br><span class="line"><span class="keyword">size_t</span> php_printf(<span class="keyword">const</span> <span class="keyword">char</span> *format, ...);  <span class="comment">// 格式化输出到 PHP</span></span><br><span class="line"><span class="keyword">size_t</span> php_output_write(<span class="keyword">const</span> <span class="keyword">char</span> *str, <span class="keyword">size_t</span> len);  <span class="comment">// 等同于 PHPWRITE 宏</span></span><br></pre></td></tr></table></figure>
